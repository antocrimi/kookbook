name: cuckoobook-web
region: nyc

static_sites:
  - name: web
    github:
      repo: antocrimi/kookbook
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: corepack enable && pnpm install --frozen-lockfile && pnpm --filter web build
    output_dir: apps/web/out
    catchall_document: 404.html
    envs:
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: BUILD_TIME
        type: GENERAL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: GENERAL
